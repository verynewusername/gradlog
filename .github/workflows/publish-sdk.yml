name: Publish Python SDK to PyPI

on:
  push:
    branches:
      - main
    paths:
      - "sdk/python/**"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for trusted publishing
      contents: write  # required to push the version bump commit

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check if SDK changed vs last publish
        id: check
        working-directory: sdk/python
        run: |
          # Find the last SDK git tag as baseline
          LAST_TAG=$(git tag --list 'sdk-v*' --sort=-version:refname | head -1)
          if [ -z "$LAST_TAG" ]; then
            echo "No previous sdk tag found — will publish."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            CHANGED=$(git diff "$LAST_TAG"..HEAD -- . | wc -l | tr -d ' ')
            if [ "$CHANGED" -gt 0 ]; then
              echo "SDK changed since $LAST_TAG — will publish."
              echo "changed=true" >> "$GITHUB_OUTPUT"
            else
              echo "No SDK changes since $LAST_TAG — skipping."
              echo "changed=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Compute new version
        id: bump
        if: steps.check.outputs.changed == 'true'
        working-directory: sdk/python
        run: |
          CURRENT=$(grep '^version' pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          NEW="$MAJOR.$MINOR.$((PATCH + 1))"
          # Patch pyproject.toml in-place (no commit needed)
          sed -i "s/^version = \"$CURRENT\"/version = \"$NEW\"/" pyproject.toml
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "Bumped $CURRENT → $NEW"

      - name: Install build tools
        if: steps.check.outputs.changed == 'true'
        run: pip install build

      - name: Build package
        if: steps.check.outputs.changed == 'true'
        working-directory: sdk/python
        run: python -m build

      - name: Publish to PyPI
        if: steps.check.outputs.changed == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/python/dist/

      - name: Tag published version
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "sdk-v${{ steps.bump.outputs.version }}"
          git push origin "sdk-v${{ steps.bump.outputs.version }}"
